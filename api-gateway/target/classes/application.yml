server:
  port: 8080

spring:
  application:
    name: api-gateway
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  zipkin:
    base-url: http://zipkin:9411
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: policy-service
          uri: lb://policy-service
          predicates:
            - Path=/api/policies/**
        - id: policy-admin-service
          uri: lb://policy-service
          predicates:
            - Path=/api/admin/policies/**
        - id: claims-service
          uri: lb://claims-service
          predicates:
            - Path=/api/claims/**
        - id: claims-admin-service
          uri: lb://claims-service
          predicates:
            - Path=/api/admin/claims/**
        - id: admin-report-service
          uri: lb://admin-report-service
          predicates:
            - Path=/api/admin/reports/**,/api/admin/dashboard/**
        - id: admin-service
          uri: lb://admin-report-service
          predicates:
            - Path=/api/admin/**
        - id: auth-service-docs
          uri: lb://auth-service
          predicates:
            - Path=/v3/api-docs/auth
          filters:
            - RewritePath=/v3/api-docs/auth, /v3/api-docs
        - id: policy-service-docs
          uri: lb://policy-service
          predicates:
            - Path=/v3/api-docs/policy
          filters:
            - RewritePath=/v3/api-docs/policy, /v3/api-docs
        - id: claims-service-docs
          uri: lb://claims-service
          predicates:
            - Path=/v3/api-docs/claims
          filters:
            - RewritePath=/v3/api-docs/claims, /v3/api-docs
        - id: admin-report-service-docs
          uri: lb://admin-report-service
          predicates:
            - Path=/v3/api-docs/admin
          filters:
            - RewritePath=/v3/api-docs/admin, /v3/api-docs
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

security:
  jwt:
    secret: ${JWT_SECRET:INSURANCE_MANAGEMENT_SYSTEM_JWT_SECRET_KEY_2026_SECURE_TOKEN_123456789}

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html
    urls:
      - name: gateway
        url: /v3/api-docs
      - name: auth-service
        url: /v3/api-docs/auth
      - name: policy-service
        url: /v3/api-docs/policy
      - name: claims-service
        url: /v3/api-docs/claims
      - name: admin-report-service
        url: /v3/api-docs/admin

logging:
  pattern:
    level: "%5p [${spring.application.name}, traceId=%X{traceId}, spanId=%X{spanId}]"
