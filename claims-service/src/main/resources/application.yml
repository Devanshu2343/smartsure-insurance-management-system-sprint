server:
  port: 8083

spring:
  application:
    name: claims-service
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:claims_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:8877825600}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  zipkin:
    base-url: http://zipkin:9411

auth-service:
  url: ${AUTH_SERVICE_URL:http://localhost:8081}

policy-service:
  url: ${POLICY_SERVICE_URL:http://localhost:8082}

api:
  gateway:
    url: ${API_GATEWAY_URL:http://localhost:8080}

audit:
  events:
    file: ${AUDIT_FILE:logs/audit-events.jsonl}
  idempotency:
    ttl-seconds: ${IDEMPOTENCY_TTL_SECONDS:3600}

events:
  policy:
    created:
      version: 1

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [${spring.application.name}, traceId=%X{traceId}, spanId=%X{spanId}]"
